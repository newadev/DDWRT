name: Cache Cleanup

on:
  # 每周一 UTC 时间 0:00 清理
  schedule:
    - cron: '0 0 * * 1'
  
  # 手动触发
  workflow_dispatch:
    inputs:
      older_than_days:
        description: '清理多少天前的缓存'
        required: true
        default: '7'
        type: string

permissions:
  actions: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    
    steps:
    - name: 清理过期缓存
      uses: actions/github-script@v8
      with:
        script: |
          const olderThanDays = parseInt('${{ github.event.inputs.older_than_days }}' || '7');
          const cutoffDate = new Date();
          cutoffDate.setDate(cutoffDate.getDate() - olderThanDays);
          
          console.log(`清理 ${olderThanDays} 天前的缓存...`);
          console.log(`截止日期: ${cutoffDate.toISOString()}`);
          
          // 分页获取所有缓存
          let page = 1;
          let allCaches = [];
          while (true) {
            const resp = await github.rest.actions.getActionsCacheList({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
              page: page
            });
            allCaches = allCaches.concat(resp.data.actions_caches);
            if (resp.data.actions_caches.length < 100) break;
            page++;
          }
          
          let deletedCount = 0;
          let deletedSize = 0;
          
          for (const cache of allCaches) {
            const cacheDate = new Date(cache.last_accessed_at);
            
            if (cacheDate < cutoffDate) {
              console.log(`删除缓存: ${cache.key} (${(cache.size_in_bytes / 1024 / 1024).toFixed(2)} MB)`);
              
              await github.rest.actions.deleteActionsCacheById({
                owner: context.repo.owner,
                repo: context.repo.repo,
                cache_id: cache.id
              });
              
              deletedCount++;
              deletedSize += cache.size_in_bytes;
            }
          }
          
          console.log(`\n清理完成!`);
          console.log(`删除缓存数: ${deletedCount}`);
          console.log(`释放空间: ${(deletedSize / 1024 / 1024).toFixed(2)} MB`);
          
          // 写入 Summary
          await core.summary
            .addHeading('缓存清理报告')
            .addTable([
              [{data: '项目', header: true}, {data: '数值', header: true}],
              ['清理天数阈值', `${olderThanDays} 天`],
              ['删除缓存数', `${deletedCount}`],
              ['释放空间', `${(deletedSize / 1024 / 1024).toFixed(2)} MB`]
            ])
            .write();
